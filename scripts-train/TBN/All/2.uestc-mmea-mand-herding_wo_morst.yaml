# TBN-MAND wo_morst (All) Method with mand_fusion — MoRST 비활성화 ablation
name: 'Train TBN-MAND_wo_morst (All) Method (morst_lambda=0.4, morst_beta=0.005) on UESTC-MMEA-CL (Seeds 1993-1997, Inc 8)'
project: 'Experimental Results on the MMEA-OWCL (CL Training & Evaluation)'
entity: 'mmea-owcl'

method: grid # or random, bayes
metric:
  goal: maximize
  name: Task/avg_acc
program: main.py

parameters:
  dataset:
    values: ['mmea']
  train_list:
    values: ['mmea_train_total.txt']
  test_list:
    values: ['mmea_test.txt']
  model_name:
    values: ['tbn_mand_wo_morst']   # model_factory: TBN_MAND with morst_enabled=False
  workers:
    values: [4]
  epochs:
    values: [50]

  # ---------------------------
  # Incremental Learning Config
  # ---------------------------
  exemplar_selection:
    values: ['herding']
  modality:
    values: [['RGB', 'Gyro', 'Acce']]
  fusion_type:
    values: ['mand_fusion']
  pretrain_epochs:
    values: [50]
  confidence_method:
    values: ['energy']
  energy_norm_method:
    values: ["zscore"]
  morst_enabled:
    values: [false]                 # MoRST 비활성화 (wo_morst 핵심)
  mode:
    values: ['train']
  increment:
    values: [8]
  enable_ood:
    values: [false]
  weights_path:
    values: [null]
  seed:
    values: [1993, 1994, 1995, 1996, 1997]
  experiment_suffix:
    values: ["wo_morst"]            # 실험 디렉토리 구분용
  # ---------------------------
  # 🔹 Hyperparameters to Sweep: λ (morst_lambda), β (morst_beta)
  # MAND: mand.py — morst_beta(β), morst_lambda(λ). Temperature 없음.
  # baseline_tbn/fusion: aux_loss_weight 또는 morst_lambda 사용
  # ---------------------------
  morst_lambda:
    values: [0.4]
  morst_beta:
    values: [0.005]
