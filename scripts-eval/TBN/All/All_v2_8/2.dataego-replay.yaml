# TBN-Replay (All) Method
name: 'v2_8_Evaluate TBN-Replay (All) Method on DataEgo (Seeds 1993-1997)'
project: 'Experimental Results on the MMEA-OWCL (Evaluation CL & OOD)'
entity: 'mmea-owcl'

method: grid # or random, bayes
metric:
  goal: maximize
  name: Task/avg_acc
program: main.py

parameters:
  dataset:
    values: ['dataego']
  train_list:
    values: ['dataego_train.txt']
  model_name:
    values: ['tbn_replay']
  workers:
    values: [4]
  epochs:
    values: [50]
  device:
    values: [0]
  # Hyperparameters 
  modality: 
    values: [["RGB", "Gyro", "Acce"]]
  fusion_type:
    values: ['auxiliary_head_v2_8']
  pretrain_epochs:
    values: [10]
  mode:
    values: ["eval"]
  increment:
    values: [5]
  enable_ood:
    values: [true]
  ood_methods:
    values: [["MSP", "ODIN", "Energy", "LTS_Individual"]]
  seed:
    values: [1993, 1994, 1995, 1996, 1997]
