name: '[MoAS_check] τ∈{3.0}, η∈{3.0}, γ∈{4.0} | TBN-MAND (Inc 8,4,2) Seeds 1993-1997'
project: 'Experimental Results on the MMEA-OWCL (Evaluation CL & OOD)'
entity: 'mmea-owcl'

method: grid
metric:
  goal: maximize
  name: Task/avg_acc
program: main.py

parameters:
  dataset:
    values: ['mmea']
  train_list:
    values: ['mmea_train_total.txt']
  test_list:
    values: ['mmea_test.txt']
  model_name:
    values: ['tbn_mand']
  workers:
    values: [4]
  epochs:
    values: [50]

  # ---------------------------
  # Incremental Learning Config
  # ---------------------------
  exemplar_selection:
    values: ['herding']
  modality:
    values: [['RGB', 'Gyro', 'Acce']]
  fusion_type:
    values: ['mand_fusion']
  pretrain_epochs:
    values: [50]
  mode:
    values: ['eval']
  increment:
    values: [8, 4, 2]
  enable_ood:
    values: [true]
  weights_path:
    values: [null]
  # train 시 experiment_suffix: "train"으로 저장된 가중치를 로드하기 위해 동일 suffix 필요
  # 가중치 경로: logs/{dataset}_{model}_{fusion}_{modality}_ep{e}_bs{b}_pb{p}_fr{f}_inc{inc}_mem{mem}_train/herding/seed_{s}/weights/beta0.1_lambda0.5/
  experiment_suffix:
    values: ["train"]

  # [Logit-Diag] 배치별 logit → energy → weight 흐름 로그 저장
  # 경로는 trainer.py에서 자동 생성:
  #   logs/{experiment_dir}/results/diag_logit_enm-abs_energy_inc{N}_seed{S}.log
  # 직접 지정하려면 아래 주석 해제 후 경로 수정
  # diag_log_path:
  #   values: ['logs/diag/abs_energy.log']
  ood_methods:
    values: [[
      # ========================================
      # [MoAS Ablation Study]
      # 각 컴포넌트의 기여를 단계적으로 측정
      #
      # variant                  | score 수식
      # -------------------------+----------------------------------------------
      # MoAS_AdaptiveFusion      | max(z_fused)                       (fusion only)
      # MoAS_DeviationPenalty    | max(z_fused) - η·P(x)              (+ P(x))
      # MoAS_KLPenalty           | max(z_fused) - γ·D_KL(x)           (+ D_KL)
      # MoAS                     | max(z_fused) - η·P(x) - γ·D_KL(x)  (full)  [Eq. 7]
      #
      # z_fused = z_main + Σ_m α_m·z_m  (kNN 기반 modality weighting, 모든 variant 공통)
      # η = ood_eta, γ = ood_gamma, τ = tau
      # ========================================

      # ── Baselines ────────────────────────────────────────────────────
      "MaxLogit_Baseline",
      "MaxLogit_Hybrid_UniformAverage",

      # # ── MoAS Ablation ────────────────────────────────────────────────
      # "MoAS_AdaptiveFusion",      # adaptive fusion only (α_m weights, no penalty)
      # "MoAS_DeviationPenalty",    # + known-class deviation penalty η·P(x)
      # "MoAS_KLPenalty",         # + cross-modal KL penalty (γ·D_KL)
      "MoAS",        
      # "MoAS_old",    # full MoAS (= CrossModalKNNMoASDetector)
    ]]
  seed:
    values: [1993, 1994, 1995, 1996, 1997]

  # ---------------------------
  # 🔹 Hyperparameters to Sweep: λ (morst_lambda), β (morst_beta)
  # MAND: mand.py — morst_beta(β), morst_lambda(λ). Temperature 없음.
  # baseline_tbn/fusion: aux_loss_weight 또는 morst_lambda 사용
  # ---------------------------
  morst_lambda:
    values: [0.4]
  morst_beta:
    values: [0.005]

  # ---------------------------
  # 🔹 Temperature τ Sweep  [Eq. 3]
  # Modality reliability weight α_m = softmax(-d̃_m / τ) 의 sharpening 강도.
  # τ가 클수록 더 균등한 가중치 (soft), 작을수록 argmax에 가까운 가중치 (sharp).
  #
  # τ = 2.0, 3.0, 4.0, 5.0 
  # τ = 1.0 : 기존 그대로 (standard softmax, weight collapse 가능성 높음)
  # τ = 0.5 : 약한 sharpening
  # τ = 0.3 : 중간 sharpening  ← pilot 추천 시작점
  # τ = 0.1 : 강한 sharpening (u_stack 차이가 작아도 거의 argmax처럼 동작)
  #
  # 현재 runs: increment(3) × seed(5) × tau(4) = 60 runs
  # 빠른 pilot 원하면 seed를 [1993]으로 줄이고 increment를 [8]로 고정 → 4 runs
  # ---------------------------
  tau:
    values: [3.0]

  # ---------------------------
  # 🔹 OOD Penalty Hyperparameters (Stage 1 Sweep)
  # Cross-Modal methods의 penalty 강도 탐색.
  #
  # ood_eta  (η): known-class deviation penalty weight  [Eq. 7]
  #   낮을수록 거리 penalty 약함 (logit fusion 위주)
  #   높을수록 OOD 억제 강함 (FP 증가 위험)
  #   runs 기준 P(x)_mean × η ∈ [0.3, 0.8] 이 적정
  #
  # ood_gamma (γ): cross-modal KL disagreement penalty weight  [Eq. 7]
  #   0.0 = KL penalty 없음 (CrossModal variant가 base와 동일하게 동작)
  #   0.3~0.5 = P(x)와 D_KL이 균형 (D_KL ≈ 0.5 nats 기준)
  #   1.0+ = D_KL 지배 (near-OOD 강화, ID score 약간 낮아질 수 있음)
  #
  # 총 runs: increment(3) × seed(5) × η(4) × γ(4) = 240 runs
  # 빠른 pilot: seed=[1993], increment=[8] → 16 runs
  # ---------------------------
  ood_eta:
    values: [3.0]

  ood_gamma:
    values: [4.0]


  # ---------------------------
  # 🔹 ASH percentile Sweep
  # ASHMultimodal에서 각 branch logit의 상위 p%를 zeroing하는 비율.
  # p 낮을수록 덜 제거 (원본에 가까움), 높을수록 더 제거 (stronger shaping)
  # MaxLogit_Hybrid_UniformAverage에는 영향 없음 (비교 baseline으로만 사용됨).
  # 현재 runs: increment(3) × seed(5) × ash_percentile(4) = 60 runs
  # ---------------------------
  # ash_percentile:
  #   values: [50, 65, 75, 90]

  # # ---------------------------
  # # 🔹 ProtoMoE-Suppress Hyperparameters
  # # moe_beta : sigmoid slope. 높을수록 thresh 기준이 sharp해짐
  # #   β=1 → 부드러운 게이팅, β=3 → 거의 hard gate
  # # moe_thresh: suppression 기준 z-score
  # #   -1.28 = buffer 하위 10% (보수적), -1.0 = 권장 시작점, 0.0 = 공격적
  # # ScoreLevelFusion / BufferCalibratedFusion / 기타에는 영향 없음
  # # ---------------------------
  # moe_beta:
  #   values: [1.0, 2.0, 3.0]
  # moe_thresh:
  #   values: [-1.28, -1.0, -0.5]
